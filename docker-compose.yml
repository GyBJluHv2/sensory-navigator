services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: sensory_postgres
    environment:
      POSTGRES_USER: navigator
      POSTGRES_PASSWORD: navigator
      POSTGRES_DB: sensory_navigator
      TZ: Europe/Moscow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U navigator -d sensory_navigator"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sensory_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: navigator
      DB_PASSWORD: navigator
      DB_NAME: sensory_navigator
      DB_SSLMODE: disable
      JWT_SECRET: dev-secret-change-in-prod
      JWT_TTL: 168h
      BCRYPT_COST: 10
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
